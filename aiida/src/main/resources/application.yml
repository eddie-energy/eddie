spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/aiida
    username: REPLACE_ME
    password: REPLACE_ME
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: 'true'
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: 'classpath:db/aiida/migration'
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${aiida.keycloak.url.external}/realms/${aiida.keycloak.realm}
          jwk-set-uri: ${aiida.keycloak.url.internal}/realms/${aiida.keycloak.realm}/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      show-components: always

aiida:
  cleanup:
    interval: P1D
    entities:
      aiida-record:
        retention: P1D
      failed-to-send-entity:
        retention: P1D
      inbound-record:
        retention: P1D
  public:
    url: ${AIIDA_EXTERNAL_HOST:http://localhost:${server.port:8080}}
  mqtt:
    internal-host: ${MQTT_INTERNAL_HOST:tcp://localhost:1884}
    external-host: ${MQTT_EXTERNAL_HOST:tcp://localhost:1884}
    bcrypt-salt-rounds: ${MQTT_BCRYPT_SALT_ROUNDS:12}
    password: ${MQTT_PASSWORD:REPLACE_ME_WITH_SAFE_PASSWORD}
    tls-certificate-path: ${MQTT_TLS_CERTIFICATE_PATH:}
  keycloak:
    url:
      internal: ${KEYCLOAK_INTERNAL_HOST:http://localhost:8888}
      external: ${KEYCLOAK_EXTERNAL_HOST:http://localhost:8888}
    realm: ${KEYCLOAK_REALM:AIIDA}
    client: ${KEYCLOAK_CLIENT:AIIDA}
  data-source:
    it:
      sinapsi-alfa:
        mqtt-host: ${DATA_SOURCE_IT_SINAPSI_ALFA_MQTT_HOST:tcp://hstbrk.sghiot.com:1883}
        mqtt-username: ${DATA_SOURCE_IT_SINAPSI_ALFA_MQTT_USERNAME:}
        mqtt-password: ${DATA_SOURCE_IT_SINAPSI_ALFA_MQTT_PASSWORD:}