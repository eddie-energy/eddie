spring:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: 'true'
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.aiida.energy/iam/realms/AIIDA
          jwk-set-uri: https://auth.aiida.energy/iam/realms/AIIDA/protocol/openid-connect/certs

aiida:
  cleanup:
    cleanup-interval: P1D
    entities:
      aiida-record:
        retention: P1D
      failed-to-send-entity:
        retention: PT5M
      inbound-record:
        retention: P1D
  mqtt:
    bcrypt-salt-rounds: 12
    password: Test123!
